<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp cưới Tùng & Hà</title>

<style>

@font-face{
font-family:'Edwardian';
src:url('UTM-Edwardian.ttf');
}

body{
margin:0;
font-family:Cambria;
background:white;
color:black;
overflow-x:hidden;
}

/* OPEN CARD */

#cover{
position:fixed;
width:100%;
height:100%;
background:#fdf5e6;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.card{
width:280px;
height:200px;
background:white;
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:1s;
transform-style:preserve-3d;
}

.card.open{
transform:rotateY(180deg);
}

button{
padding:12px 30px;
border:none;
background:#DAA520;
color:white;
border-radius:8px;
margin-top:10px;
}

/* PARALLAX HERO */

.hero{
height:100vh;
background:url(images/anh1.jpg) center/cover fixed;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.names{
font-family:'Edwardian';
font-size:55px;
color:#DAA520;
text-shadow:2px 2px 5px black;
}

/* SECTION */

.section{
padding:60px 20px;
text-align:center;
}

/* COUNTDOWN */

.countdown{
font-size:26px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
max-width:1000px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

/* MODAL */

#modal{
position:fixed;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.9);
top:0;
left:0;
width:100%;
height:100%;
}

#modal img{
max-width:90%;
border-radius:10px;
}

/* RSVP */

.rsvp input{
padding:10px;
margin:8px;
width:250px;
}

/* FLOWERS */

.flower{
position:fixed;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>

</head>

<body>

<div id="cover">

<div class="card" id="card">

<h3>💌 Thiệp cưới</h3>

<p>
Nguyễn Đình Tùng<br>
và<br>
Nguyễn Thị Thu Hà
</p>

<button onclick="openCard()">Mở thiệp</button>

</div>

</div>

<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<section class="hero">

<div class="names">

Nguyễn Đình Tùng<br>
và<br>
Nguyễn Thị Thu Hà

</div>

</section>

<section class="section">

<h2>Trân trọng kính mời</h2>

<p>Đến tham dự lễ cưới của chúng tôi</p>

</section>

<section class="section">

<h2>Đếm ngược ngày cưới</h2>

<div id="countdown" class="countdown"></div>

</section>

<section class="section">

<h2>Album ảnh cưới</h2>

<div class="gallery">

<img src="images/anh1.jpg" onclick="zoom(this)">
<img src="images/anh2.jpg" onclick="zoom(this)">
<img src="images/anh3.jpg" onclick="zoom(this)">
<img src="images/anh4.jpg" onclick="zoom(this)">
<img src="images/anh5.jpg" onclick="zoom(this)">
<img src="images/anh6.jpg" onclick="zoom(this)">
<img src="images/anh7.jpg" onclick="zoom(this)">
<img src="images/anh8.jpg" onclick="zoom(this)">
<img src="images/anh9.jpg" onclick="zoom(this)">

</div>

</section>

<div id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<section class="section">

<h2>Địa điểm tổ chức</h2>

<iframe
width="90%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q=ha%20noi&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</section>

<section class="section">

<h2>Xác nhận tham dự</h2>

<form action="https://formspree.io/f/yourID" method="POST">

<input name="name" placeholder="Tên của bạn"><br>

<input name="guest" placeholder="Số người tham dự"><br>

<button type="submit">Xác nhận</button>

</form>

</section>

<script>

/* open card */

function openCard(){

document.getElementById("card").classList.add("open")

setTimeout(()=>{

document.getElementById("cover").style.display="none"

document.getElementById("music").play()

},1000)

}

/* countdown */

var date=new Date("March 29, 2026 17:30:00").getTime()

setInterval(function(){

var now=new Date().getTime()

var d=date-now

var days=Math.floor(d/(1000*60*60*24))

var hours=Math.floor((d%(1000*60*60*24))/(1000*60*60))

var mins=Math.floor((d%(1000*60*60))/(1000*60))

document.getElementById("countdown").innerHTML=

days+" ngày "+hours+" giờ "+mins+" phút"

},1000)

/* zoom gallery */

function zoom(img){

document.getElementById("modal").style.display="flex"

document.getElementById("modalImg").src=img.src

}

function closeImg(){

document.getElementById("modal").style.display="none"

}

/* flower */

function flower(){

const f=document.createElement("div")

f.className="flower"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},8000)

}

setInterval(flower,500)

</script>

</body>
</html>
